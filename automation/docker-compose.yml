version: "3.8"

services:
  n8n-automation:
    image: n8nio/n8n:latest
    container_name: n8n-automation
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - GENERIC_TIMEZONE=Asia/Jerusalem
      - TZ=Asia/Jerusalem
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://${N8N_HOST}/
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_RESTRICT_ENVIRONMENT_VARIABLES_ACCESS=false
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      - NODE_FUNCTION_ALLOW_BUILTIN=crypto,fs,path
    ports:
      - "127.0.0.1:5678:5678"
    volumes:
      - ./data:/home/node/.n8n
      - n8n-cache:/home/node/.cache
    networks:
      - automation-internal
      - web-proxy
    depends_on:
      - gmail-relay
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    mem_limit: 512m
    pids_limit: 100
    read_only: false
    tmpfs:
      - /tmp
      - /home/node/.cache

  gmail-relay:
    build: ./gmail-relay
    container_name: gmail-relay
    restart: always
    volumes:
      - ./gmail-relay/config:/config
    networks:
      - automation-internal
      - web-proxy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    mem_limit: 128m
    pids_limit: 30

networks:
  automation-internal:
    driver: bridge
    internal: true
  web-proxy:
    external: true

volumes:
  n8n-cache:
